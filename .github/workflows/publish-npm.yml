name: Publish npm Packages

on:
  push:
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            binary: ocw
          - os: windows-latest
            runtime: win-x64
            binary: ocw.exe
          - os: macos-14
            runtime: osx-arm64
            binary: ocw

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/OpencodeWrap.csproj -r ${{ matrix.runtime }}

      - name: Publish
        run: dotnet publish src/OpencodeWrap.csproj -c Release -r ${{ matrix.runtime }} --self-contained true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ocw-${{ matrix.runtime }}
          path: src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download linux binary
        uses: actions/download-artifact@v8
        with:
          name: ocw-linux-x64
          path: build-artifacts/ocw-linux-x64

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: ocw-osx-arm64
          path: build-artifacts/ocw-osx-arm64

      - name: Download windows binary
        uses: actions/download-artifact@v8
        with:
          name: ocw-win-x64
          path: build-artifacts/ocw-win-x64

      - name: Prepare npm package directories
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            NPM_DIST_TAG="latest"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}.r${GITHUB_RUN_ATTEMPT}"
            NPM_DIST_TAG="dev"
          fi

          test -n "$VERSION"
          test -n "$NPM_DIST_TAG"

          mkdir -p npm/ocw-linux-x64/bin npm/ocw-darwin-arm64/bin npm/ocw-win32-x64/bin
          cp build-artifacts/ocw-linux-x64/ocw npm/ocw-linux-x64/bin/ocw
          cp build-artifacts/ocw-osx-arm64/ocw npm/ocw-darwin-arm64/bin/ocw
          cp build-artifacts/ocw-win-x64/ocw.exe npm/ocw-win32-x64/bin/ocw.exe

          chmod +x npm/ocw/bin/ocw.js npm/ocw-linux-x64/bin/ocw npm/ocw-darwin-arm64/bin/ocw

          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-linux-x64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-darwin-arm64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-win32-x64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw

          export VERSION NPM_DIST_TAG
          node -e 'const fs=require("node:fs"); const p="npm/ocw/package.json"; const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync(p, "utf8")); pkg.optionalDependencies["@farsight-cda/ocw-linux-x64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-darwin-arm64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-win32-x64"]=version; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+"\n");'

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            NPM_DIST_TAG="latest"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}.r${GITHUB_RUN_ATTEMPT}"
            NPM_DIST_TAG="dev"
          fi

          for PACKAGE_DIR in npm/ocw-linux-x64 npm/ocw-darwin-arm64 npm/ocw-win32-x64; do
            PACKAGE_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
              continue
            fi

            (cd "${PACKAGE_DIR}" && npm publish --access public --tag "${NPM_DIST_TAG}")
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            NPM_DIST_TAG="latest"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}.r${GITHUB_RUN_ATTEMPT}"
            NPM_DIST_TAG="dev"
          fi

          PACKAGE_NAME=$(node -p "require('./npm/ocw/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
            exit 0
          fi

          (cd npm/ocw && npm publish --access public --tag "${NPM_DIST_TAG}")
