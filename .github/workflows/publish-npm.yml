name: Publish npm Packages

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  resolve-publish-context:
    name: Resolve publish context
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      dev_build_ref: ${{ steps.context.outputs.dev_build_ref }}
      dev_version: ${{ steps.context.outputs.dev_version }}
      release_build_ref: ${{ steps.context.outputs.release_build_ref }}
      release_version: ${{ steps.context.outputs.release_version }}
      should_publish_release: ${{ steps.context.outputs.should_publish_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version and tags
        id: context
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          read_version() {
            python3 -c 'import subprocess, sys, xml.etree.ElementTree as ET; target=sys.argv[1]; text=open("version.props", encoding="utf-8").read() if target == "WORKTREE" else subprocess.check_output(["git", "show", f"{target}:version.props"], text=True); version=(ET.fromstring(text).findtext(".//Version") or "").strip(); print(version) if version else sys.exit("version.props does not contain a <Version> value")' "$1"
          }

          create_tag_if_needed() {
            local commit="$1"
            local version="$2"
            local tag="v${version}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              local existing_commit
              existing_commit=$(git rev-list -n 1 "${tag}")
              if [[ "${existing_commit}" == "${commit}" ]]; then
                echo "${tag} already points to ${commit}."
                return
              fi

              echo "${tag} already exists on ${existing_commit}; refusing to reuse version ${version}." >&2
              exit 1
            fi

            git tag "${tag}" "${commit}"
            git push origin "refs/tags/${tag}"
            echo "Created ${tag} for ${commit}."
          }

          dev_build_ref="${SHA}"
          dev_version="0.0.0-dev.${RUN_NUMBER}.${SHA::7}.r${RUN_ATTEMPT}"
          release_build_ref=""
          release_version=""
          should_publish_release="false"

          current_version=$(read_version WORKTREE)
          current_tag="v${current_version}"

          if [[ "${REF_TYPE}" == "tag" ]]; then
            release_build_ref="${SHA}"
            release_version="${current_version}"
            if [[ "${REF_NAME}" != "${current_tag}" ]]; then
              echo "Tag ${REF_NAME} does not match version.props (${current_version})." >&2
              exit 1
            fi

            should_publish_release="true"
          elif ! git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
            release_build_ref="${SHA}"
            release_version="${current_version}"
            create_tag_if_needed "${SHA}" "${release_version}"
            should_publish_release="true"
          fi

          echo "dev_build_ref=${dev_build_ref}" >> "${GITHUB_OUTPUT}"
          echo "dev_version=${dev_version}" >> "${GITHUB_OUTPUT}"
          echo "release_build_ref=${release_build_ref}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "should_publish_release=${should_publish_release}" >> "${GITHUB_OUTPUT}"

  prepare-release:
    name: Prepare GitHub release
    if: needs.resolve-publish-context.outputs.should_publish_release == 'true'
    runs-on: ubuntu-latest
    needs: resolve-publish-context
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: v${{ needs.resolve-publish-context.outputs.release_version }}

    steps:
      - name: Ensure GitHub release exists
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub release already exists for $RELEASE_TAG."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

  publish-dev-platform-package:
    name: Publish dev ${{ matrix.package_suffix }}
    runs-on: ${{ matrix.os }}
    needs: resolve-publish-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            binary: ocw
            package_dir: npm/ocw-linux-x64
            package_suffix: linux-x64
            asset_name: ocw-linux-x64
          - os: windows-latest
            runtime: win-x64
            binary: ocw.exe
            package_dir: npm/ocw-win32-x64
            package_suffix: win32-x64
            asset_name: ocw-win-x64.exe
          - os: macos-14
            runtime: osx-arm64
            binary: ocw
            package_dir: npm/ocw-darwin-arm64
            package_suffix: darwin-arm64
            asset_name: ocw-osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.dev_build_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Build and publish platform package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.resolve-publish-context.outputs.dev_version }}
        run: |
          set -euo pipefail

          dotnet restore src/OpencodeWrap.csproj -r "${{ matrix.runtime }}"
          dotnet publish src/OpencodeWrap.csproj -c Release -r "${{ matrix.runtime }}" --self-contained true -p:PublishAot=true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:UseAppHost=true

          mkdir -p "${{ matrix.package_dir }}/bin"
          cp "src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}" "${{ matrix.package_dir }}/bin/${{ matrix.binary }}"

          if [[ "${{ matrix.binary }}" != *.exe ]]; then
            chmod +x "${{ matrix.package_dir }}/bin/${{ matrix.binary }}"
          fi

          npm version "$VERSION" --no-git-tag-version --prefix "${{ matrix.package_dir }}"

          PACKAGE_NAME=$(node -p "require('./${{ matrix.package_dir }}/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
            exit 0
          fi

          (cd "${{ matrix.package_dir }}" && npm publish --access public --tag dev)

  publish-dev-main-package:
    name: Publish dev main package
    runs-on: ubuntu-latest
    needs:
      - resolve-publish-context
      - publish-dev-platform-package
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.resolve-publish-context.outputs.dev_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.dev_build_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Prepare and publish main package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          chmod +x npm/ocw/bin/ocw.js
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw

          export VERSION
          node -e 'const fs=require("node:fs"); const p="npm/ocw/package.json"; const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync(p, "utf8")); pkg.optionalDependencies["@farsight-cda/ocw-linux-x64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-darwin-arm64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-win32-x64"]=version; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+"\n");'

          PACKAGE_NAME=$(node -p "require('./npm/ocw/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
            exit 0
          fi

          (cd npm/ocw && npm publish --access public --tag dev)

  publish-release-platform-package:
    name: Publish release ${{ matrix.package_suffix }}
    if: needs.resolve-publish-context.outputs.should_publish_release == 'true'
    runs-on: ${{ matrix.os }}
    needs:
      - resolve-publish-context
      - prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            binary: ocw
            package_dir: npm/ocw-linux-x64
            package_suffix: linux-x64
            asset_name: ocw-linux-x64
          - os: windows-latest
            runtime: win-x64
            binary: ocw.exe
            package_dir: npm/ocw-win32-x64
            package_suffix: win32-x64
            asset_name: ocw-win-x64.exe
          - os: macos-14
            runtime: osx-arm64
            binary: ocw
            package_dir: npm/ocw-darwin-arm64
            package_suffix: darwin-arm64
            asset_name: ocw-osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.release_build_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Build, publish package, and upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TAG: v${{ needs.resolve-publish-context.outputs.release_version }}
          VERSION: ${{ needs.resolve-publish-context.outputs.release_version }}
        run: |
          set -euo pipefail

          dotnet restore src/OpencodeWrap.csproj -r "${{ matrix.runtime }}"
          dotnet publish src/OpencodeWrap.csproj -c Release -r "${{ matrix.runtime }}" --self-contained true -p:PublishAot=true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:UseAppHost=true

          mkdir -p "${{ matrix.package_dir }}/bin"
          cp "src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}" "${{ matrix.package_dir }}/bin/${{ matrix.binary }}"

          if [[ "${{ matrix.binary }}" != *.exe ]]; then
            chmod +x "${{ matrix.package_dir }}/bin/${{ matrix.binary }}"
          fi

          npm version "$VERSION" --no-git-tag-version --prefix "${{ matrix.package_dir }}"

          PACKAGE_NAME=$(node -p "require('./${{ matrix.package_dir }}/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
          else
            (cd "${{ matrix.package_dir }}" && npm publish --access public --tag latest)
          fi

          gh release upload "$RELEASE_TAG" "src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}#${{ matrix.asset_name }}" --clobber

  publish-release-main-package:
    name: Publish release main package
    if: needs.resolve-publish-context.outputs.should_publish_release == 'true'
    runs-on: ubuntu-latest
    needs:
      - resolve-publish-context
      - publish-release-platform-package
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.resolve-publish-context.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.release_build_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Prepare and publish main package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          chmod +x npm/ocw/bin/ocw.js
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw

          export VERSION
          node -e 'const fs=require("node:fs"); const p="npm/ocw/package.json"; const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync(p, "utf8")); pkg.optionalDependencies["@farsight-cda/ocw-linux-x64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-darwin-arm64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-win32-x64"]=version; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+"\n");'

          PACKAGE_NAME=$(node -p "require('./npm/ocw/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
            exit 0
          fi

          (cd npm/ocw && npm publish --access public --tag latest)
