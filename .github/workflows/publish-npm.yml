name: Publish npm Packages

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  resolve-publish-context:
    name: Resolve publish context
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      dev_build_ref: ${{ steps.context.outputs.dev_build_ref }}
      dev_version: ${{ steps.context.outputs.dev_version }}
      release_build_ref: ${{ steps.context.outputs.release_build_ref }}
      release_version: ${{ steps.context.outputs.release_version }}
      should_publish_release: ${{ steps.context.outputs.should_publish_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version and tags
        id: context
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          read_version() {
            python3 - "$1" <<'PY'
            import subprocess
            import sys
            import xml.etree.ElementTree as ET

            target = sys.argv[1]
            if target == "WORKTREE":
                with open("version.props", "r", encoding="utf-8") as handle:
                    text = handle.read()
            else:
                text = subprocess.check_output(["git", "show", f"{target}:version.props"], text=True)

            root = ET.fromstring(text)
            version = (root.findtext(".//Version") or "").strip()
            if not version:
                raise SystemExit("version.props does not contain a <Version> value")

            print(version)
            PY
          }

          create_tag_if_needed() {
            local commit="$1"
            local version="$2"
            local tag="v${version}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              local existing_commit
              existing_commit=$(git rev-list -n 1 "${tag}")
              if [[ "${existing_commit}" == "${commit}" ]]; then
                echo "${tag} already points to ${commit}."
                return
              fi

              echo "${tag} already exists on ${existing_commit}; refusing to reuse version ${version}." >&2
              exit 1
            fi

            git tag -a "${tag}" "${commit}" -m "Release ${tag}"
            new_tags+=("${tag}")
            echo "Created ${tag} for ${commit}."
          }

          dev_build_ref="${SHA}"
          dev_version="0.0.0-dev.${RUN_NUMBER}.${SHA::7}.r${RUN_ATTEMPT}"
          release_build_ref=""
          release_version=""
          should_publish_release="false"

          current_version=$(read_version WORKTREE)
          current_tag="v${current_version}"

          if [[ "${REF_TYPE}" == "tag" ]]; then
            release_build_ref="${SHA}"
            release_version="${current_version}"
            if [[ "${REF_NAME}" != "${current_tag}" ]]; then
              echo "Tag ${REF_NAME} does not match version.props (${current_version})." >&2
              exit 1
            fi

            should_publish_release="true"
          elif ! git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
            new_tags=()
            release_build_ref="${SHA}"
            release_version="${current_version}"
            create_tag_if_needed "${SHA}" "${release_version}"

            if [[ ${#new_tags[@]} -gt 0 ]]; then
              git push origin "${new_tags[@]}"
            fi

            should_publish_release="true"
          fi

          echo "dev_build_ref=${dev_build_ref}" >> "${GITHUB_OUTPUT}"
          echo "dev_version=${dev_version}" >> "${GITHUB_OUTPUT}"
          echo "release_build_ref=${release_build_ref}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "should_publish_release=${should_publish_release}" >> "${GITHUB_OUTPUT}"

  build-dev-binaries:
    name: Build dev ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    needs: resolve-publish-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            binary: ocw
          - os: windows-latest
            runtime: win-x64
            binary: ocw.exe
          - os: macos-14
            runtime: osx-arm64
            binary: ocw

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.dev_build_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/OpencodeWrap.csproj -r ${{ matrix.runtime }}

      - name: Publish
        run: dotnet publish src/OpencodeWrap.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishAot=true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:UseAppHost=true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: dev-ocw-${{ matrix.runtime }}
          path: src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14

  build-release-binaries:
    name: Build release ${{ matrix.runtime }}
    if: needs.resolve-publish-context.outputs.should_publish_release == 'true'
    runs-on: ${{ matrix.os }}
    needs: resolve-publish-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            binary: ocw
          - os: windows-latest
            runtime: win-x64
            binary: ocw.exe
          - os: macos-14
            runtime: osx-arm64
            binary: ocw

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.release_build_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/OpencodeWrap.csproj -r ${{ matrix.runtime }}

      - name: Publish
        run: dotnet publish src/OpencodeWrap.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishAot=true -p:PublishSingleFile=true -p:PublishTrimmed=true -p:UseAppHost=true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-ocw-${{ matrix.runtime }}
          path: src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14

  publish-dev-npm:
    name: Publish dev npm
    runs-on: ubuntu-latest
    needs:
      - resolve-publish-context
      - build-dev-binaries
    permissions:
      contents: read
    env:
      NPM_DIST_TAG: dev
      VERSION: ${{ needs.resolve-publish-context.outputs.dev_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.dev_build_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download linux binary
        uses: actions/download-artifact@v8
        with:
          name: dev-ocw-linux-x64
          path: build-artifacts/ocw-linux-x64

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: dev-ocw-osx-arm64
          path: build-artifacts/ocw-osx-arm64

      - name: Download windows binary
        uses: actions/download-artifact@v8
        with:
          name: dev-ocw-win-x64
          path: build-artifacts/ocw-win-x64

      - name: Prepare npm package directories
        run: |
          test -n "$VERSION"

          mkdir -p npm/ocw-linux-x64/bin npm/ocw-darwin-arm64/bin npm/ocw-win32-x64/bin
          cp build-artifacts/ocw-linux-x64/ocw npm/ocw-linux-x64/bin/ocw
          cp build-artifacts/ocw-osx-arm64/ocw npm/ocw-darwin-arm64/bin/ocw
          cp build-artifacts/ocw-win-x64/ocw.exe npm/ocw-win32-x64/bin/ocw.exe

          chmod +x npm/ocw/bin/ocw.js npm/ocw-linux-x64/bin/ocw npm/ocw-darwin-arm64/bin/ocw

          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-linux-x64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-darwin-arm64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-win32-x64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw

          export VERSION
          node -e 'const fs=require("node:fs"); const p="npm/ocw/package.json"; const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync(p, "utf8")); pkg.optionalDependencies["@farsight-cda/ocw-linux-x64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-darwin-arm64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-win32-x64"]=version; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+"\n");'

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for PACKAGE_DIR in npm/ocw-linux-x64 npm/ocw-darwin-arm64 npm/ocw-win32-x64; do
            PACKAGE_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
              continue
            fi

            (cd "${PACKAGE_DIR}" && npm publish --access public --tag "${NPM_DIST_TAG}")
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./npm/ocw/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
            exit 0
          fi

          (cd npm/ocw && npm publish --access public --tag "${NPM_DIST_TAG}")

  publish-release-npm:
    name: Publish release npm
    if: needs.resolve-publish-context.outputs.should_publish_release == 'true'
    runs-on: ubuntu-latest
    needs:
      - resolve-publish-context
      - build-release-binaries
    permissions:
      contents: read
    env:
      NPM_DIST_TAG: latest
      VERSION: ${{ needs.resolve-publish-context.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-publish-context.outputs.release_build_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download linux binary
        uses: actions/download-artifact@v8
        with:
          name: release-ocw-linux-x64
          path: build-artifacts/ocw-linux-x64

      - name: Download macOS binary
        uses: actions/download-artifact@v8
        with:
          name: release-ocw-osx-arm64
          path: build-artifacts/ocw-osx-arm64

      - name: Download windows binary
        uses: actions/download-artifact@v8
        with:
          name: release-ocw-win-x64
          path: build-artifacts/ocw-win-x64

      - name: Prepare npm package directories
        run: |
          test -n "$VERSION"

          mkdir -p npm/ocw-linux-x64/bin npm/ocw-darwin-arm64/bin npm/ocw-win32-x64/bin
          cp build-artifacts/ocw-linux-x64/ocw npm/ocw-linux-x64/bin/ocw
          cp build-artifacts/ocw-osx-arm64/ocw npm/ocw-darwin-arm64/bin/ocw
          cp build-artifacts/ocw-win-x64/ocw.exe npm/ocw-win32-x64/bin/ocw.exe

          chmod +x npm/ocw/bin/ocw.js npm/ocw-linux-x64/bin/ocw npm/ocw-darwin-arm64/bin/ocw

          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-linux-x64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-darwin-arm64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw-win32-x64
          npm version "$VERSION" --no-git-tag-version --prefix npm/ocw

          export VERSION
          node -e 'const fs=require("node:fs"); const p="npm/ocw/package.json"; const version=process.env.VERSION; const pkg=JSON.parse(fs.readFileSync(p, "utf8")); pkg.optionalDependencies["@farsight-cda/ocw-linux-x64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-darwin-arm64"]=version; pkg.optionalDependencies["@farsight-cda/ocw-win32-x64"]=version; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+"\n");'

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for PACKAGE_DIR in npm/ocw-linux-x64 npm/ocw-darwin-arm64 npm/ocw-win32-x64; do
            PACKAGE_NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
            if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
              continue
            fi

            (cd "${PACKAGE_DIR}" && npm publish --access public --tag "${NPM_DIST_TAG}")
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./npm/ocw/package.json').name")
          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping ${PACKAGE_NAME}@${VERSION}, already published."
            exit 0
          fi

          (cd npm/ocw && npm publish --access public --tag "${NPM_DIST_TAG}")
