name: Build Artifacts

on:
  workflow_dispatch:
  push:
  
jobs:
  publish:
    name: Publish ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            binary: ocw
          - os: windows-latest
            runtime: win-x64
            binary: ocw.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Install Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/OpencodeWrap.csproj -r ${{ matrix.runtime }}

      - name: Publish
        run: dotnet publish src/OpencodeWrap.csproj -c Release -r ${{ matrix.runtime }} --self-contained true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocw-${{ matrix.runtime }}
          path: src/bin/Release/net10.0/${{ matrix.runtime }}/publish/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14
